<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - VCP Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #4e73df;
            background-image: linear-gradient(180deg, #4e73df 10%, #224abe 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem 0 rgba(0, 0, 0, 0.4);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }
        .card-header {
            background-color: #fff;
            padding: 2.5rem 1.5rem 1rem;
            text-align: center;
            border-bottom: none;
        }
        .card-body {
            background-color: #fff;
            padding: 1.5rem 2.5rem 3rem;
        }
        .btn-admin {
            background-color: #4e73df;
            border: none;
            padding: 0.75rem;
            font-weight: bold;
            color: #fff;
            border-radius: 2rem;
            transition: all 0.3s;
        }
        .btn-admin:hover {
            background-color: #2e59d9;
            box-shadow: 0 0.25rem 0.5rem 0 rgba(0, 0, 0, 0.2);
            color: #fff;
        }
        .form-control {
            border-radius: 2rem;
            padding: 0.75rem 1.25rem;
        }
        .icon {
            color: #4e73df;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="card login-card">
    <div class="card-header">
        <div class="icon">
            <i class="fas fa-shield-alt fa-3x"></i>
        </div>
        <h4 class="text-gray-900 mb-2">Quản trị viên VCP</h4>
        <p class="text-muted small">Vui lòng đăng nhập để quản lý hệ thống</p>
    </div>
    <div class="card-body">
        <div th:if="${param.error}" class="alert alert-danger small py-2 mb-4">
            <i class="fas fa-exclamation-circle me-1"></i> Tài khoản hoặc mật khẩu không đúng.
        </div>
        <div th:if="${param.logout}" class="alert alert-success small py-2 mb-4">
            Đăng xuất thành công.
        </div>

        <form th:action="@{/admin/login}" method="post">
            <div class="mb-3">
                <input type="text" class="form-control" name="username" placeholder="Tên đăng nhập Admin" required autofocus>
            </div>
            <div class="mb-4">
                <input type="password" class="form-control" name="password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" class="btn btn-admin w-100">Đăng nhập vào Hệ thống</button>
        </form>

        <hr class="my-4">
        
        <div class="text-center small">
            <a th:href="@{/login}" class="text-decoration-none">← Quay lại Đăng nhập Công dân</a>
        </div>
    </div>
</div>

</body>
</html>
