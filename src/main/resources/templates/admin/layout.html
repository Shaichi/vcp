<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Quản trị VCP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fc;
        }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #4e73df 10%, #224abe 100%);
        }
        .sidebar .nav-link {
            color: rgba(255, 255, 255, .8);
            padding: 1rem;
            font-size: 0.9rem;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background-color: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link i {
            margin-right: 10px;
        }
        .topbar {
            background-color: #fff;
            box-shadow: 0 .15rem 1.75rem 0 rgba(58,59,69,.15);
        }
        .container-fluid {
            padding: 1.5rem;
        }
        .card {
            box-shadow: 0 .15rem 1.75rem 0 rgba(58,59,69,.15);
            border: none;
            border-radius: .35rem;
        }
    </style>
</head>
<body>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar col-md-3 col-lg-2 d-md-block collapse">
        <div class="d-flex align-items-center justify-content-center p-3 text-white border-bottom border-light">
            <i class="fas fa-shield-alt fa-2x me-2"></i>
            <h5 class="mb-0">Quản trị VCP</h5>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''" href="/admin/dashboard">
                    <i class="fas fa-fw fa-tachometer-alt"></i> Bảng điều khiển
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activePage == 'rules'} ? 'active' : ''" href="/admin/rules">
                    <i class="fas fa-fw fa-list-check"></i> Quy tắc tính điểm
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activePage == 'tiers'} ? 'active' : ''" href="/admin/tiers">
                    <i class="fas fa-fw fa-layer-group"></i> Hạng mức
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activePage == 'incentives'} ? 'active' : ''" href="#">
                    <i class="fas fa-fw fa-percent"></i> Ưu đãi
                </a>
            </li>
            <li class="nav-item mt-5 pt-3 border-top border-light">
                <form th:action="@{/logout}" method="post" class="px-3">
                    <button type="submit" class="btn btn-danger w-100 btn-sm">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </button>
                </form>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="col-md-9 col-lg-10 ms-sm-auto w-100">
        <!-- Topbar -->
        <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top">
            <ul class="navbar-nav ms-auto pe-3">
                <li class="nav-item dropdown no-arrow text-black-50 d-flex align-items-center">
                    <span class="mr-2 d-none d-lg-inline text-gray-600 small">Quản trị viên</span>
                    <i class="fas fa-user-circle fa-2x ms-2 text-primary"></i>
                </li>
            </ul>
        </nav>

        <!-- Page Content -->
        <div class="container-fluid" layout:fragment="content">
            <!-- Content will be injected here -->
        </div>
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
